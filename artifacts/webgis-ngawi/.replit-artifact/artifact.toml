kind = "web"
previewPath = "/"
title = "WebGIS Ngawi"
version = "1.0.0"
id = "artifacts/webgis-ngawi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22165

[services.development]
run = "pnpm --filter @workspace/webgis-ngawi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/webgis-ngawi", "run", "build" ]
publicDir = "artifacts/webgis-ngawi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22165"
BASE_PATH = "/"
